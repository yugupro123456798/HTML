<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript String Methods</title>
    </head>
    <body>
        <h2>JavaScript String Methods</h2>
        <p id="numberresult"></p>
        <p id="stringresult"></p>
        <script>
            var x = 70;
            var y = 90;
            document.getElementById("numberresult").innerHTML = x+y
            document.getElementById("stringresult").innerHTML = String(x) + String(y)
        </script>
    </body>
</html>
