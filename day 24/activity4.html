<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript arrow functions</title>
    </head>
    <body>
        <h2>JavaScript Arrow Functions</h2>
        <p id="result"></p>
        <script>
            const add = (a, b) => a + b;
            document.getElementById("result").innerHTML = add(5, 10);
        </script>
    </body>
</html>
