<!DOCTYPE html>
<html>
    <head>
        <title>sorting in array</title>
    </head>
    <body>
        <h2>JavaScript Array Sorting</h2>
        <p>Click the button to sort the array in ascending and descending order.</p>
        <button onclick="ascending()">Ascending</button>
        <button onclick="descending()">Descending</button>
        <p id="result"></p>
        <script>
            var arr = [4, 2, 3, 1, 5, 6];

            function ascending() {
                arr.sort(function(a, b) {
                    return a - b;
                });
                document.getElementById("result").innerHTML = "Ascending: " + arr.join(", ");
            }

            function descending() {
                arr.sort(function(a, b) {
                    return b - a;
                });
                document.getElementById("result").innerHTML = "Descending: " + arr.join(", ");
            }
        </script>
    </body>
</html>
