<!DOCTYPE html>
<html>
    <head>
        <title>Evaluate Variables in JavaScript</title>
    </head>
    <body>
        <p>Click the button to evaluate javascript expressions:</p>
        <button onclick="evaluate()">Evaluate</button>
        <p id="result"></p>
        <script>
            function evaluate() {
                var x = 5;
                var y = 10;
                var a= eval("x + y")+"<br>";
                var b= eval("2 * 2")+"<br>";
                var c= eval("y - x")+"<br>";
                var z= a + b + c;
                document.getElementById("result").innerHTML = "Result: " + z;
            }
        </script>

    </body>
</html>
