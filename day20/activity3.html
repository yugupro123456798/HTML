<!DOCTYPE html>
<html>
    <head>
        <title>Real time validation form </title>
        <style>
            body{
                font-family: Georgia, 'Times New Roman', Times, serif;
                text-align: center;
                margin: 0;
                padding: 0;
            }
            .box{
                width: 420px;
                margin: auto;
                border: 2px solid black;
                padding: 18px;
            }
            .row{
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                margin: 10px 0;
            }
        </style>
    </head>
    <body>
        <h1>Real time validation in Javascript</h1>
        <hr>
        <div class="box">
            <form id="loginForm">
                <div class="row">
                    <label>email</label>
                    <input type="text" id="email" placeholder="id@gmail.com">
                </div>
                <div class="row">
                    <label>password</label>
                    <input type="password" id="password">
                </div>
                <div class="row">
                    <label>age</label>
                    <input type="number" id="age">
                </div>
                <button type="submit">login</button>
            </form>
        </div>
        <p id="message"></p>
        <script src="script1.js">
        </script>
    </body>
</html>
