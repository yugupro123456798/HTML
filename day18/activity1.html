<!DOCTYPE html>
<html>
<head>
    <title>Java script string methods</title>
</head>
<body>
    <h2>string methods</h2>
    <script>
        var script = "Yugveer";
        document.write(script.toUpperCase());
        document.write("<br>");
        document.write(script.toLowerCase());
        document.write("<br>");
        document.write(script.length);
        document.write("<br>");
        document.write(script.slice(0, 3));
    </script>
</body>
</html>
