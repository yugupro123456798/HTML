<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript functions</title>
    </head>
    <body>
        <p id="demo"></p>
        <script>
            function add(a, b) {
                return a + b;
            }
            function average(a, b) {
               return add(a, b) / 2;
            }
            let result = average(10, 20);
            document.getElementById("demo").innerHTML = "The average of 10 and 20 is: " + result;S
        </script>
    </body>
</html>
