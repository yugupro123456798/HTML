<!DOCTYPE html>
<html>
    <head>
        <title>Array Methods in JavaScript</title>
    </head>
    <body>
        <p id="demo"></p>
        <p id="demo1"></p>
        <script>
            var fruits = ["Apple", "Banana", "Orange"];
            fruits.push("Grapes");
            document.getElementById("demo").innerHTML = fruits.join(" # ");
            fruits.pop();
            document.getElementById("demo1").innerHTML = fruits
        </script>
    </body>
</html>
