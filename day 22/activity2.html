<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript Class Inheritance</title>
    </head>
    <body>
        <h2>JavaScript Class Inheritance</h2>
        <p>we use the <code>extends</code> keyword to create a class that inherits from another class.</p>
        <p id="details"></p>
        <script>
            class Person {
                constructor(name, age) {
                    this.name = name;
                    this.age = age;
                }

                greet() {
                    return `Hello, my name is ${this.name} and I am ${this.age} years old.`;
                }
            }

            class Student extends Person {
                constructor(name, age, grade) {
                    super(name, age); // Call the parent class constructor
                    this.grade = grade;
                }

                study() {
                    return `${this.name} is studying in grade ${this.grade}.`;
                }
            }

            const student1 = new Student('Charlie', 20, 'A');
            document.getElementById('details').innerHTML = student1.greet() + '<br>' + student1.study();
        </script>
    </body>
</html>
