<!DOCTYPE html>
<html>
    <head>
        <title>random numbers using while loop</title>
    </head>
    <body>
        <h1>Random Numbers using While Loop</h1>
        <p id="number"></p>
        <script>
            var text=""
            var i=0
            while(i<10){
                var randomNumber = Math.floor(Math.random() * 100) + 1; // Generate a random number between 1 and 100
                text=text+"<br> the random number is "+randomNumber
                i++
            }
            document.getElementById("number").innerHTML = text;
        </script>
    </body>
</html>
