<!DOCTYPE html>
<html>
    <head>
        <title>loops in JavaScript</title>
    </head>
    <body>
        <h1>loops in JavaScript</h1>
        <p id="number"></p>
        <script>
            var text=""
            var i=0
            while(i<10){
                text=text+"<br> the number is "+i
                i++
            }
            document.getElementById("number").innerHTML = text;
        </script>
    </body>
</html>
