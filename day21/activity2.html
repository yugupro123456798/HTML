<!DOCTYPE html>
<html>
    <head>
        <title>Conditional Statements in JavaScript</title>
    </head>
    <body>
        <h1>Conditional Statements in JavaScript</h1>
        <script>
            var age = 20;
            if (age >= 18) {
                document.write("You are eligible to vote.");
            } else {
                document.write("You are not eligible to vote.");
            }
        </script>
    </body>
</html>
