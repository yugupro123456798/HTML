<!DOCTYPE html>
<html>
    <head>
        <title>functions in jave script</title>
    </head>
    <body>
        <button onclick="myFunction(5,5)">Click me!</button>
        <script>
            function myFunction(x,y) {
              if (x === undefined) {
                x = 2;
              }
              if (y === undefined) {
                y = 4;
              }
              document.write(x * y);
            }
        </script>
    </body>
</html>
